# Narrow east-west channel (~3.3 km wide) formed by two land masses.
# Polaris enters from the east and must thread through to the goal beyond the
# western exit. Southward airflow (tw_dir_deg: 180) is perpendicular to the
# westbound course, while the narrow walls test course-holding.
tw_dir_deg: 180
tw_speed_kmph: 12.0
heading_deg: -90.0

gps:
  latitude: 49.280
  longitude: -123.15
  speed_kmph: 12.0

# [lon, lat]
land:
  # North land mass
  - [[-123.45, 49.298],
     [-123.18, 49.298],
     [-123.18, 49.400],
     [-123.45, 49.400]]

  # South land mass
  - [[-123.45, 49.200],
     [-123.18, 49.200],
     [-123.18, 49.265],
     [-123.45, 49.265]]

global_path:
  waypoints:
    - {latitude: 49.280, longitude: -123.50}
    - {latitude: 49.280, longitude: -123.65}
