# Airflow drops to ~0.8 kn (1.5 kph) while traveling west. Polaris is also
# heading west, directly inside the downwind no-go cone, with little drive or
# steering authority. The westbound goal is downwind under the flow-toward
# convention, so the planner must leave the cone and rebuild boat speed before
# attempting further progress.
tw_dir_deg: 270
tw_speed_kmph: 1.5
heading_deg: -90.0

gps:
  latitude: 49.28
  longitude: -123.18
  speed_kmph: 2.5

global_path:
  waypoints:
    - {latitude: 49.28, longitude: -123.45}
    - {latitude: 49.28, longitude: -123.60}
