# Airflow travels west through the channel exit. The westbound destination is
# therefore directly downwind under the flow-toward convention, and the planner
# must gybe through the narrow passage. The downwind no-go cone is ±45° around
# 270°, so headings 225°–315° are rejected and force alternating NW/SW legs.
tw_dir_deg: 270
tw_speed_kmph: 15.0
heading_deg: -45.0

gps:
  latitude: 49.280
  longitude: -123.15
  speed_kmph: 10.0

# [lon, lat]
land:
  # North land mass
  - [[-123.45, 49.298],
     [-123.18, 49.298],
     [-123.18, 49.400],
     [-123.45, 49.400]]

  # South land mass
  - [[-123.45, 49.200],
     [-123.18, 49.200],
     [-123.18, 49.265],
     [-123.45, 49.265]]

global_path:
  waypoints:
    - {latitude: 49.280, longitude: -123.50}
    - {latitude: 49.280, longitude: -123.65}
