# Polaris is sandwiched between a coastline ~1.5 km to the north and an AIS ship
# ~2 km to the south travelling on a parallel westward course.
# COLREGS Rule 13 (overtaking): the AIS ship is slower, so Polaris is overtaking —
# Polaris is the give-way vessel and must keep clear while also avoiding the coast.
# Airflow travels south, away from the northern coast.
tw_dir_deg: 180
tw_speed_kmph: 12.0
heading_deg: -90.0

gps:
  latitude: 49.270
  longitude: -123.18
  speed_kmph: 12.0

ais:
  - {id: 1, lat: 49.250, lon: -123.22, heading: 270.0, speed: 8.0, rot: 0, width: 3.0, height: 10.0}

# [lon, lat] — coastline to the north
land:
  - [[-123.55, 49.284],
     [-123.15, 49.284],
     [-123.15, 49.400],
     [-123.55, 49.400]]

global_path:
  waypoints:
    - {latitude: 49.270, longitude: -123.50}
    - {latitude: 49.270, longitude: -123.65}
