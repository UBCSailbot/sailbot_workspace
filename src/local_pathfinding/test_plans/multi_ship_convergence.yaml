# Three AIS ships converge on Polaris simultaneously from different sectors.
# COLREGS analysis (Polaris heading west = starboard is north, port is south):
#   Ship 1 (dead ahead, heading east): head-on, Rule 14 — both alter to starboard.
#   Ship 2 (from NE, heading SW): on Polaris's starboard bow, Rule 15 — Polaris give-way.
#   Ship 3 (from SE, heading NW): on Polaris's port bow, Rule 15 — Polaris stand-on.
# Turning starboard (south) to avoid Ship 1 & 2 conflicts with Ship 3 from the south —
# the planner must resolve the combined constraint.
tw_dir_deg: 180
tw_speed_kmph: 12.0
heading_deg: -90.0

gps:
  latitude: 49.28
  longitude: -123.18
  speed_kmph: 12.0

ais:
  - {id: 1, lat: 49.28, lon: -123.30, heading: 90.0,  speed: 12.0, rot: 0, width: 3.0, height: 10.0}
  - {id: 2, lat: 49.33, lon: -123.23, heading: 225.0, speed: 10.0, rot: 0, width: 2.0, height: 8.0}
  - {id: 3, lat: 49.23, lon: -123.23, heading: 315.0, speed: 10.0, rot: 0, width: 2.0, height: 8.0}

global_path:
  waypoints:
    - {latitude: 49.28, longitude: -123.50}
    - {latitude: 49.28, longitude: -123.65}
